name: Daily Market Intel

on:
  schedule:
    - cron: '0 13 * * 1-5'  # Runs 1:00 PM UTC = 9:00 AM EST, weekdays only
  workflow_dispatch:          # Lets you trigger it manually from GitHub as a test

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run tracker
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: python main.py
